# =============================================================================
# branches.example.yaml — career branches
#
# A branch is a distinct career arc you emphasize for different role types.
# The `job-search-setup` skill auto-detects these by reading your career
# file and proposing 2-4 candidates; you confirm/edit. After that, edit this
# file directly whenever your career changes.
#
# Single-branch careers are fine — list one entry and the framework skips
# the branch-resolution step entirely.
#
# This example shows the showcase candidate: a senior PM with a B2C past
# and a B2B-SaaS target.
# =============================================================================

branches:
  - name: product-management
    display_name: "Product Management"
    # The company whose role fills the 3rd CV experience slot when a
    # diagnosis selects this branch. Must be a company in your career file.
    third_slot_company: "Alpha Apps"
    # A short voice descriptor — how CVs/letters for this branch should read.
    voice_descriptor: "cross-functional, outcome-oriented, user-focused"
    # Seed keywords used to score whether an ambiguous role belongs to this
    # branch. The diagnosis still pulls verbatim JD keywords separately.
    keyword_seeds:
      - "product"
      - "PM"
      - "roadmap"
      - "user research"
      - "activation"
      - "growth"

  - name: growth-analytics
    display_name: "Growth & Analytics"
    third_slot_company: "Alpha Apps"
    voice_descriptor: "quantitative, experiment-led, funnel-focused"
    keyword_seeds:
      - "growth"
      - "analytics"
      - "experimentation"
      - "funnel"
      - "retention"
      - "A/B testing"

# Notes:
# - The first two CV experience slots are always your most recent /
#   longest-tenure roles (chronological). Only the third slot is
#   branch-driven. See cv-tailor/references/experience-slot-logic.md.
# - A role that fits no branch can be diagnosed as `branch: general`,
#   which falls back to config.yaml > cv.default_third_slot.
# - Adding a branch later: re-run job-search-setup, or just edit this file.
